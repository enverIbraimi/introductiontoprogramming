<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    
    <link href="/static/styles.css" rel="stylesheet">
</head>

{% extends "layout.html" %}

{% block main %}
<div class="container mt-5">
    <h2>Report an Eco-Observation</h2>
    <form action="/report" method="post">
        <div class="form-group">
            <select name="category" class="form-control">
                <option disabled selected>Select Category</option>
                <option value="Recycling">Recycling Spot</option>
                <option value="Air Quality">Air Quality Observation</option>
            </select>
        </div>
        <div class="form-group">
            <input name="location" class="form-control" placeholder="Neighborhood or Street Name" type="text">
        </div>
        <div class="form-group">
            <textarea name="description" class="form-control" placeholder="Describe what you see..."></textarea>
        </div>
        <button class="btn btn-success" type="submit">Submit Report</button>
    </form>
</div>
{% endblock %}
